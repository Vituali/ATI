<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0064ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0041a3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#grad)" />
  
  <!-- Subtle shadow for depth -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="rgba(0,0,0,0.1)" />

  <!-- The "ATI" Text -->
  <text 
    x="50%" 
    y="54%" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="900" 
    font-size="240" 
    fill="white" 
    style="letter-spacing: -10px;"
  >
    ATI
  </text>
  
  <!-- Subtle accent line -->
  <rect x="180" y="380" width="152" height="24" rx="12" fill="rgba(255,255,255,0.4)" />

  <!-- RED NOTIFICATION DOT -->
  <circle cx="440" cy="72" r="80" fill="#ff4d4d" stroke="white" stroke-width="20" />
</svg>
